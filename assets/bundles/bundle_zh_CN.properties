# block.tj-tool-ammo-source.details = 允许放置于深水中.\n\n消耗栏的物品可以点击但这显然并非设计之中的功能，如您所见点击它们并不会发生任何事情，自然也包括右侧的重置按钮。事实上我们希望提供更简洁的配置方式，对于固定消耗的物品弹药源会默认提供，否则每次都手动配置启用将会是毫无意义的，尽管您可能会需要一个是否启用炮台的选项，但显然配置消耗仍然显得多余，至少相较于直接移除弹药源或额外提供一个用于启用或禁用的按钮(然而并没有这个按钮)而言。\n至于为什么消耗栏可以点击，这只是我们偷懒套用布局了而已，这会在下一个版本更正，当然如果时间充裕的话...
# block.tj-tool-ammo-source.details = 允许放置于深水中.\n\n对部分炮台有额外的测试项,您会在配置面板下方看见一个超速穹顶图标的按钮,按下后即可启用饱和超速模式(显示为enable),在这个模式下炮台将以极高的速度输出,但是由于这个功能只是额外的测试项以及其本身比较危险,我们并不会保存这项配置...至少给重启存档留足了余地,您会感谢我的.\n\n[red]当前该建筑无法在多人联机中使用!!!
