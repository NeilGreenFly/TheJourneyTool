block.tj-tool-any-source.config-description-2 = 仅填充邻接建筑
block.tj-tool-any-source.warning = ! 请不要将 任意源 与炮台相邻放置 !
# block.tj-tool-any-source.details = 允许放置于深水中.\n\n空源: 默认\n任意源: 输出物品&液体\n邻接源: 仅填充邻接建筑\n\n邻接源会直接访问邻接建筑的物品和液体数据，因此可以强制填满建筑，但这同时是危险的，因此该模式会屏蔽炮台栏和物流栏，并且可能不兼容其他模组.部分数值较高的模组或许会需要.
