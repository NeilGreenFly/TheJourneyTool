block.tj-tool-any-source.name = 任意源
block.tj-tool-any-source.description = 对相邻建筑无限填充物品和液体.\n仅限沙盒.
block.tj-tool-any-source.details = 允许放置于深水中.\n\n邻接源会直接访问邻接建筑的物品和液体数据，因此可以强制填满建筑，但这同时是危险的，因此该模式会屏蔽炮台栏和物流栏，并且可能不兼容其他模组.部分数值较高的模组或许会需要.
